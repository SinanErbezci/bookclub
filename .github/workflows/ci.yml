name: CI

on:
  push:
    branches:
      - main
      - old-main

  pull_request:
    branches:
      - main
      - old-main

jobs:

  backend:
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookclub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Django setup
        run: |
          python manage.py check

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          npm install

      - name: Run ESLint
        run: |
          npm run lint

      - name: Test production build
        run: |
          npm run build
          
  docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookclub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bookclub .
  
deploy:
  runs-on: ubuntu-latest

  needs:
    - backend
    - frontend
    - docker

  if: github.ref == 'refs/heads/main'

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      working-directory: ./bookclub
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: bookclub
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy via SSM
      run: |
        aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy BookClub" \
          --parameters 'commands=[
            "cd /home/ec2-user/bookclub/bookclub",
            "aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin 796973519136.dkr.ecr.eu-west-3.amazonaws.com",
            "docker compose pull",
            "docker compose up -d --force-recreate",
            "docker image prune -f"
          ]' \
          --region eu-west-3