name: CI

on:
  push:
    branches:
      - main
      - old-main

  pull_request:
    branches:
      - main
      - old-main

permissions:
  id-token: write
  contents: read
  
jobs:

  backend:
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookclub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Django setup
        run: |
          python manage.py check

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          npm ci

      - name: Run ESLint
        run: |
          npm run lint

      - name: Test production build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: npm run build
          
  docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookclub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bookclub .
  
  deploy:
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend
      - docker

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::796973519136:role/github-actions-bookclub
          aws-region: eu-west-3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: ./bookclub
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: bookclub
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Upload deployment assets
        run: |
          aws s3 sync deploy/ s3://sinan-bookclub-deploy-assets --delete

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy BookClub" \
            --parameters 'commands=[
              "aws s3 sync s3://sinan-bookclub-deploy-assets /opt/bookclub --delete",
              "chmod +x /opt/bookclub/deploy.sh",
              "cd /opt/bookclub",
              "./deploy.sh"
            ]' \
            --region eu-west-3
            --query "Command.CommandId" \
            --output text)
          
          echo "Command ID: $COMMAND_ID"

          sleep 5

          aws ssm wait command-executed \ 
          --command-id "$COMMAND_ID" \ 
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" 
          aws ssm get-command-invocation \ 
          --command-id "$COMMAND_ID" \ 
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

  frontend-deploy:
    runs-on: ubuntu-latest

    needs:
      - frontend

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::796973519136:role/github-actions-bookclub
          aws-region: eu-west-3

      - name: Upload build to S3
        run: |
          aws s3 sync \
            frontend/build \
            s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"