services:
  web:
    build: .
    
    healthcheck:
      test: ["CMD", "curl",  "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

    container_name: bookclub_web
    restart: unless-stopped

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DJANGO_SETTINGS_MODULE: mysite.settings.development