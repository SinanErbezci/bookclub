services:
  db:
    image: postgres:17
    container_name: bookclub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookclub
      POSTGRES_USER: bookclub
      POSTGRES_PASSWORD: bookclubpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  web:
    build: .
    container_name: bookclub_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME: bookclub
      DB_USER: bookclub
      DB_PASSWORD: bookclubpass
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
  
volumes:
  postgres_data: