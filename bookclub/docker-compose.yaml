services:
  db:
    image: postgres:17
    container_name: bookclub_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: bookclub_web
    restart: unless-stopped

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DJANGO_SETTINGS_MODULE: mysite.settings.development
      DB_HOST: db
      DB_PORT: 5432

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: